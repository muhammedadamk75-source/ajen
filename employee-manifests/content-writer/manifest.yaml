apiVersion: ajen.dev/v1
kind: EmployeeManifest

metadata:
  id: "content-writer"
  name: "Content Writer"
  version: "1.0.0"
  description: "Specializes in marketing copy and documentation"
  author: "Yash Chudasama"
  tags: ["marketing", "content", "writing"]

spec:
  role: "content_writer"
  tier: "worker"

  model:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    temperature: 0.8
    maxTokens: 4096

  persona: "./PERSONA.md"

  tools:
    builtin:
      - "filesystem.read_file"
      - "filesystem.write_file"
      - "filesystem.list_directory"

  capabilities:
    canDelegateWork: false
    canExecuteShell: false
    canAccessInternet: false
    maxConcurrentTasks: 3

  reportsTo: ["cmo"]

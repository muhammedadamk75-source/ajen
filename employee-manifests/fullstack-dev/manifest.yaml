apiVersion: ajen.dev/v1
kind: EmployeeManifest

metadata:
  id: "fullstack-dev"
  name: "Full Stack Developer"
  version: "1.0.0"
  description: "Builds features end-to-end across frontend and backend"
  author: "Yash Chudasama"
  tags: ["engineering", "frontend", "backend"]

spec:
  role: "fullstack_dev"
  tier: "worker"

  model:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    temperature: 0.7
    maxTokens: 4096

  persona: "./PERSONA.md"

  tools:
    builtin:
      - "filesystem.read_file"
      - "filesystem.write_file"
      - "filesystem.list_directory"

  capabilities:
    canDelegateWork: false
    canExecuteShell: true
    canAccessInternet: false
    maxConcurrentTasks: 3

  reportsTo: ["cto"]
